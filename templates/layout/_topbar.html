<header class="app-topbar">
  <div class="topbar-left">
    <i class="bi bi-grid-3x3-gap-fill" style="color:var(--brand-400);font-size:1rem;"></i>
    <span class="topbar-page-title">Bakof &mdash; Gestão de Relacionamento com Clientes</span>
  </div>
  <div class="topbar-right">
    {% if current_user.is_authenticated %}
    <span style="font-size:0.8rem;color:var(--text-3);">
      <i class="bi bi-clock me-1"></i>
      <span id="topbar-clock"></span>
    </span>
    {% endif %}
  </div>
</header>

<script>
  (function() {
    var el = document.getElementById('topbar-clock');
    if (!el) return;
    function tick() {
      var d = new Date();
      el.textContent = d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }
    tick();
    setInterval(tick, 30000);
  })();
</script>
