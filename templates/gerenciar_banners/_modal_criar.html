<!-- Modal Criar Banner -->
<div class="modal fade" id="modalCriarBanner" tabindex="-1">

            <label for="titulo" class="form-label">Tﾃδｭtulo <span class="text-danger">*</span></label>

          </div>
          
          <div class="mb-3">

            <textarea class="form-control" id="mensagem" name="mensagem" rows="4" required></textarea>
            <div class="form-text">Descriﾃδｧﾃδ｣o detalhada do aviso que serﾃδ｡ exibido para os usuﾃδ｡rios.</div>
          </div>

                  <option value="warning">ﾃｰﾅｸﾅｸﾂ｡ Aviso</option>

                  <option value="danger">ﾃｰﾅｸ窶敖ｴ Urgente</option>

            </div>
            <div class="col-md-6">

        </div>

    </div>

</div>
