<div class="page-header d-flex justify-content-between align-items-center">
  <div>
    <h2><i class="bi bi-check2-square text-primary me-2"></i>Gest&atilde;o de Tarefas</h2>
    <p>Organize suas atividades e compromissos</p>
  </div>
  <div class="d-flex gap-2 align-items-center">
    {% if current_user.tipo == 'supervisor' %}
    <div class="form-check form-switch mb-0">
      <input class="form-check-input" type="checkbox" id="minhasTarefas"
             {% if apenas_minhas %}checked{% endif %}
             onchange="toggleMinhasTarefas(this.checked)">
      <label class="form-check-label" for="minhasTarefas">Minhas tarefas</label>
    </div>
    {% endif %}
    <a href="{{ url_for('nova_tarefa') }}" class="btn btn-primary">
      <i class="bi bi-plus-circle"></i> Nova Tarefa
    </a>
  </div>
</div>
