    <!-- Header -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="mb-1">
                        <i class="bi bi-check2-square"></i> Gestão de Tarefas
                    </h2>
                    <p class="text-muted mb-0">Organize suas atividades e compromissos</p>
                </div>
                <div class="d-flex gap-2">
                    {% if current_user.tipo == 'supervisor' %}
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="minhasTarefas"
                               {% if apenas_minhas %}checked{% endif %}
                               onchange="toggleMinhasTarefas(this.checked)">
                        <label class="form-check-label" for="minhasTarefas">
                            Minhas tarefas
                        </label>
                    </div>
                    {% endif %}
                    <a href="{{ url_for('nova_tarefa') }}" class="btn btn-primary">
                        <i class="bi bi-plus-circle"></i> Nova Tarefa
                    </a>
                </div>
            </div>
        </div>
    </div>
