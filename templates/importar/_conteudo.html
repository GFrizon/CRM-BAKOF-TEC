<div class="page-header d-flex justify-content-between align-items-center">
  <div>
    <h2><i class="bi bi-cloud-upload-fill text-primary me-2"></i>Importar Clientes (CSV)</h2>
    <p>Selecione o consultor e envie o arquivo CSV separado por ponto e v&iacute;rgula</p>
  </div>
  <a href="{{ url_for('meus_clientes') }}" class="btn btn-outline-secondary">
    <i class="bi bi-arrow-left"></i> Voltar
  </a>
</div>

<div class="card">
  <div class="card-body">
    <form method="POST" enctype="multipart/form-data">
      <div class="mb-3">
        <label class="form-label">Selecione o Consultor ResponsÃ¡vel *</label>
        <select name="consultor_id" class="form-select" required>
          <option value="">-- Escolha --</option>
          {% for c in consultores %}
            <option value="{{ c.id }}">{{ c.nome }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Arquivo CSV *</label>
        <input type="file" name="arquivo" accept=".csv" class="form-control" required>
        <small class="text-muted">
          O arquivo deve estar no formato CSV (; separado por ponto e vÃ­rgula).
        </small>
      </div>

      <button type="submit" class="btn btn-success">
        <i class="bi bi-upload"></i> Importar Arquivo
      </button>
    </form>
  </div>
</div>
