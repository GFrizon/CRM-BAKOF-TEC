  <style>
    :root{
      --brand-50:#eff6ff;
      --brand-100:#dbeafe;
      --brand-500:#3b82f6;
      --brand-600:#2563eb;
      --brand-700:#1d4ed8;
      --brand-800:#1e40af;
      --brand-900:#1e3a8a;
      --surface:#ffffff;
      --surface-2:#f8fafc;
      --border:#e2e8f0;
      --text-2:#475569;
    }

    /* Fundo com o azul Bakof */
    body {
      background: linear-gradient(135deg, var(--brand-900) 0%, var(--brand-800) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    
    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 15px;
    }
    
    .login-card {
      background: var(--surface);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      animation: slideUp 0.5s ease-out;
    }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    
    /* Header do card com azul Bakof */
    .login-header {
      background: linear-gradient(135deg, var(--brand-800) 0%, var(--brand-600) 100%);
      padding: 2.5rem 2rem;
      text-align: center;
      color: white;
    }
    
    .login-header .logo-placeholder {
      width: 80px; height: 80px;
      margin: 0 auto 1rem;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
    }
    
    /* âœ… Logo colorida (sem filtros) */
    .login-header img {
      height: 70px;
      margin-bottom: 1rem;
      filter: none !important;
      mix-blend-mode: normal !important;
      opacity: 1 !important;
      background: transparent !important;
    }
    
    .login-header h4 { margin: 0; font-weight: 600; font-size: 1.5rem; }
    .login-header p   { margin: 0.5rem 0 0; opacity: 0.9; font-size: 0.95rem; }
    
    .login-body { padding: 2.5rem 2rem; }
    
    .form-floating { margin-bottom: 1.2rem; }
    
    .form-control {
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 1rem 1.2rem;
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    
    /* realce no foco em azul Bakof */
    .form-control:focus {
      border-color: var(--brand-600);
      box-shadow: 0 0 0 0.2rem rgba(37, 99, 235, 0.15);
    }
    
    .form-floating > label {
      padding: 1rem 1.2rem;
      color: var(--text-2);
    }
    
    /* BotÃ£o no azul Bakof; hover levemente mais escuro */
    .btn-login {
      width: 100%;
      padding: 1rem;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1.05rem;
      background: linear-gradient(135deg, var(--brand-700) 0%, var(--brand-600) 100%);
      border: none;
      color: white;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.28);
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.38);
    }
    .btn-login:active { transform: translateY(0); }
    
    .alert {
      border-radius: 12px;
      border: none;
      padding: 1rem 1.2rem;
      margin-bottom: 1.5rem;
    }
    .alert-danger { background: #fff5f5; color: #c53030; }
    
    .login-footer {
      text-align: center;
      padding: 1.5rem;
      background: var(--surface-2);
      color: var(--text-2);
      font-size: 0.85rem;
    }
    
    .demo-info {
      background: var(--surface-2);
      border-radius: 12px;
      padding: 1rem;
      margin-top: 1.5rem;
    }
    .demo-info h6 {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .demo-credential {
      background: white;
      border-radius: 8px;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .demo-credential i { color: var(--brand-700); }
    .demo-credential code { background: #e9ecef; padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.8rem; }
  </style>
