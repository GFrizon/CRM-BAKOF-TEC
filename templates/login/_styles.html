  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --brand-400: #60a5fa;
      --brand-500: #3b82f6;
      --brand-600: #2563eb;
      --brand-700: #1d4ed8;
      --brand-800: #1e40af;
      --brand-900: #1e3a8a;
      --surface:   #ffffff;
      --surface-2: #f8fafc;
      --border:    #e2e8f0;
      --text-1:    #0f172a;
      --text-2:    #475569;
      --text-3:    #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: url("{{ url_for('static', filename='img/FUNDO2.png') }}") center / cover no-repeat fixed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(245,248,255,0.35);
      pointer-events: none;
    }

    .login-container {
      width: 100%;
      max-width: 390px;
      padding: 16px;
      position: relative;
      z-index: 1;
    }

    .login-card {
      background: #ffffff;
      border: 1px solid rgba(180,210,255,0.4);
      border-radius: 22px;
      box-shadow:
        0 24px 64px rgba(30,64,175,0.18),
        0 4px 16px rgba(30,64,175,0.08);
      overflow: hidden;
      animation: slideUp 0.5s cubic-bezier(.16,1,.3,1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .login-header {
      background: linear-gradient(135deg, #040714 0%, #0b1d5c 45%, #1d4ed8 100%);
      padding: 2rem 2rem 1.6rem;
      text-align: center;
      color: white;
      position: relative;
      overflow: hidden;
    }

    /* Glow dourado no canto superior esquerdo (ecoa o wallpaper) */
    .login-header::before {
      content: '';
      position: absolute;
      top: -40px; left: -40px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(251,191,36,0.18) 0%, transparent 65%);
      pointer-events: none;
    }

    .login-header::after {
      content: '';
      position: absolute;
      bottom: -50px; right: -30px;
      width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(59,130,246,0.22) 0%, transparent 65%);
      pointer-events: none;
    }

    .login-header .logo-placeholder {
      width: 72px; height: 72px;
      margin: 0 auto 1rem;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem;
      backdrop-filter: blur(4px);
    }

    .login-header img {
      height: 52px;
      margin-bottom: 0.75rem;
      filter: none !important;
      mix-blend-mode: normal !important;
      opacity: 1 !important;
      background: transparent !important;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .login-header h4 {
      margin: 0;
      font-weight: 700;
      font-size: 1.4rem;
      letter-spacing: -0.02em;
    }

    .login-header p {
      margin: 0.4rem 0 0;
      opacity: 0.75;
      font-size: 0.875rem;
      font-weight: 400;
    }

    .login-body { padding: 1.5rem 1.75rem; background: #fff; }

    .form-floating { margin-bottom: 0.75rem; }

    .form-control {
      border-radius: 10px;
      border: 1px solid #dbeafe;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
      background: #f8faff;
      color: #0f172a;
    }

    .form-control:focus {
      background: #fff;
      border-color: var(--brand-500);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
      outline: none;
      color: #0f172a;
    }

    .form-floating > label {
      color: #94a3b8;
      font-size: 0.875rem;
      background: transparent;
    }

    .form-floating > .form-control:focus ~ label,
    .form-floating > .form-control:not(:placeholder-shown) ~ label {
      color: #64748b;
      background: transparent;
    }

    .form-floating > .form-control:focus ~ label::after,
    .form-floating > .form-control:not(:placeholder-shown) ~ label::after {
      background-color: transparent !important;
    }

    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px #f8faff inset !important;
      -webkit-text-fill-color: #0f172a !important;
      caret-color: #0f172a;
    }

    .form-check-input {
      background-color: #fff;
      border-color: #cbd5e1;
    }
    .form-check-input:checked {
      background-color: var(--brand-500);
      border-color: var(--brand-500);
    }

    .form-check-label {
      font-size: 0.875rem;
      color: #475569;
    }

    .btn-login {
      width: 100%;
      padding: 0.85rem;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.95rem;
      font-family: inherit;
      background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 100%);
      border: none;
      color: white;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 16px rgba(37,99,235,0.35);
      letter-spacing: 0.01em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 22px rgba(37,99,235,0.45);
    }

    .btn-login:active { transform: translateY(0); box-shadow: none; }

    .alert {
      border-radius: 10px;
      border: none;
      padding: 0.875rem 1rem;
      margin-bottom: 1.2rem;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .alert-danger  { background: #fff1f2; color: #be123c; border-left: 3px solid #fb7185; }
    .alert-success { background: #f0fdf4; color: #15803d; border-left: 3px solid #4ade80; }
    .alert-warning { background: #fffbeb; color: #92400e; border-left: 3px solid #fbbf24; }
    .alert-info    { background: #eff6ff; color: #1d4ed8; border-left: 3px solid #60a5fa; }

    .login-footer {
      text-align: center;
      padding: 0.9rem 1.75rem;
      background: #f8faff;
      color: #94a3b8;
      font-size: 0.75rem;
      border-top: 1px solid #e2e8f0;
    }

  </style>
