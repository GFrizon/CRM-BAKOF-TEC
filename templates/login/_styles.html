  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --brand-400: #60a5fa;
      --brand-500: #3b82f6;
      --brand-600: #2563eb;
      --brand-700: #1d4ed8;
      --brand-800: #1e40af;
      --brand-900: #1e3a8a;
      --surface:   #ffffff;
      --surface-2: #f8fafc;
      --border:    #e2e8f0;
      --text-1:    #0f172a;
      --text-2:    #475569;
      --text-3:    #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: url("{{ url_for('static', filename='img/FundoCRM.png') }}") center / cover no-repeat fixed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Overlay escuro sobre o wallpaper */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, rgba(4,7,20,0.78) 0%, rgba(8,20,65,0.65) 55%, rgba(4,12,40,0.72) 100%);
      pointer-events: none;
    }

    .login-container {
      width: 100%;
      max-width: 390px;
      padding: 16px;
      position: relative;
      z-index: 1;
    }

    .login-card {
      background: rgba(8, 16, 52, 0.78);
      backdrop-filter: blur(28px) saturate(150%);
      -webkit-backdrop-filter: blur(28px) saturate(150%);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 22px;
      box-shadow:
        0 32px 80px rgba(0,0,0,0.60),
        inset 0 1px 0 rgba(255,255,255,0.08);
      overflow: hidden;
      animation: slideUp 0.5s cubic-bezier(.16,1,.3,1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .login-header {
      background: linear-gradient(135deg, #040714 0%, #0b1d5c 45%, #1d4ed8 100%);
      padding: 2rem 2rem 1.6rem;
      text-align: center;
      color: white;
      position: relative;
      overflow: hidden;
    }

    /* Glow dourado no canto superior esquerdo (ecoa o wallpaper) */
    .login-header::before {
      content: '';
      position: absolute;
      top: -40px; left: -40px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(251,191,36,0.18) 0%, transparent 65%);
      pointer-events: none;
    }

    .login-header::after {
      content: '';
      position: absolute;
      bottom: -50px; right: -30px;
      width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(59,130,246,0.22) 0%, transparent 65%);
      pointer-events: none;
    }

    .login-header .logo-placeholder {
      width: 72px; height: 72px;
      margin: 0 auto 1rem;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem;
      backdrop-filter: blur(4px);
    }

    .login-header img {
      height: 52px;
      margin-bottom: 0.75rem;
      filter: none !important;
      mix-blend-mode: normal !important;
      opacity: 1 !important;
      background: transparent !important;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .login-header h4 {
      margin: 0;
      font-weight: 700;
      font-size: 1.4rem;
      letter-spacing: -0.02em;
    }

    .login-header p {
      margin: 0.4rem 0 0;
      opacity: 0.75;
      font-size: 0.875rem;
      font-weight: 400;
    }

    .login-body { padding: 1.5rem 1.75rem; background: transparent; }

    .form-floating { margin-bottom: 0.75rem; }

    .form-control {
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.18);
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
      background: rgba(255,255,255,0.08);
      color: #fff;
    }

    .form-control::placeholder { color: rgba(255,255,255,0.35); }

    .form-control:focus {
      background: rgba(255,255,255,0.13);
      border-color: rgba(99,160,255,0.6);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.22);
      outline: none;
      color: #fff;
    }

    .form-floating > label {
      color: rgba(255,255,255,0.55);
      font-size: 0.875rem;
      background: transparent;
    }

    .form-floating > .form-control:focus ~ label,
    .form-floating > .form-control:not(:placeholder-shown) ~ label {
      color: rgba(255,255,255,0.75);
      background: transparent;
    }

    /* Bootstrap 5.3 adiciona ::after branco na label (efeito "notch") — remover */
    .form-floating > .form-control:focus ~ label::after,
    .form-floating > .form-control:not(:placeholder-shown) ~ label::after {
      background-color: transparent !important;
    }

    /* Anular fundo branco do autofill do browser */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px rgba(8,16,52,0.92) inset !important;
      -webkit-text-fill-color: #fff !important;
      caret-color: #fff;
    }

    .form-check-input {
      background-color: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.25);
    }
    .form-check-input:checked {
      background-color: var(--brand-500);
      border-color: var(--brand-500);
    }

    .form-check-label {
      font-size: 0.875rem;
      color: rgba(255,255,255,0.7);
    }

    .btn-login {
      width: 100%;
      padding: 0.85rem;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.95rem;
      font-family: inherit;
      background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 100%);
      border: none;
      color: white;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 16px rgba(37,99,235,0.35);
      letter-spacing: 0.01em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 22px rgba(37,99,235,0.45);
    }

    .btn-login:active { transform: translateY(0); box-shadow: none; }

    .login-link {
      color: #93c5fd;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 600;
    }

    .login-link:hover {
      color: #bfdbfe;
      text-decoration: underline;
    }

    .alert {
      border-radius: 10px;
      border: none;
      padding: 0.875rem 1rem;
      margin-bottom: 1.2rem;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .alert-danger  { background: rgba(190,18,60,0.25);  color: #fca5a5; border-left: 3px solid #fb7185; }
    .alert-success { background: rgba(21,128,61,0.25);  color: #86efac; border-left: 3px solid #4ade80; }
    .alert-warning { background: rgba(146,64,14,0.30);  color: #fcd34d; border-left: 3px solid #fbbf24; }
    .alert-info    { background: rgba(29,78,216,0.30);  color: #93c5fd; border-left: 3px solid #60a5fa; }

    .login-footer {
      text-align: center;
      padding: 0.9rem 1.75rem;
      background: rgba(0,0,0,0.18);
      color: rgba(255,255,255,0.45);
      font-size: 0.75rem;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

  </style>
