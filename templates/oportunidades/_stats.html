<div class="row g-4 mb-4">
  <div class="col-md-3">
    <div class="stat-card">
      <div class="stat-icon blue"><i class="bi bi-funnel"></i></div>
      <div class="stat-value">{{ stats.total }}</div>
      <div class="stat-label">Total de Oportunidades</div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="stat-card">
      <div class="stat-icon green"><i class="bi bi-currency-dollar"></i></div>
      <div class="stat-value">{{ stats.valor_total | formatar_dinheiro }}</div>
      <div class="stat-label">Valor Total</div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="stat-card">
      <div class="stat-icon orange"><i class="bi bi-handshake"></i></div>
      <div class="stat-value">{{ stats.por_estagio.negociacao + stats.por_estagio.proposta }}</div>
      <div class="stat-label">Em Negociacao</div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="stat-card">
      <div class="stat-icon yellow"><i class="bi bi-trophy"></i></div>
      <div class="stat-value">{{ stats.por_estagio.fechamento_ganho }}</div>
      <div class="stat-label">Ganhos</div>
    </div>
  </div>
</div>
