    <!-- Estatísticas -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card bg-primary text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between">
                        <div>
                            <h4 class="mb-0">{{ stats.total }}</h4>
                            <small>Total de Oportunidades</small>
                        </div>
                        <i class="bi bi-funnel fs-2"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-success text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between">
                        <div>
                            <h4 class="mb-0">{{ stats.valor_total | formatar_dinheiro }}</h4>
                            <small>Valor Total</small>
                        </div>
                        <i class="bi bi-currency-dollar fs-2"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-warning text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between">
                        <div>
                            <h4 class="mb-0">{{ stats.por_estagio.negociacao + stats.por_estagio.proposta }}</h4>
                            <small>Em Negociaçăo</small>
                        </div>
                        <i class="bi bi-handshake fs-2"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-info text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between">
                        <div>
                            <h4 class="mb-0">{{ stats.por_estagio.fechamento_ganho }}</h4>
                            <small>Ganhos</small>
                        </div>
                        <i class="bi bi-trophy fs-2"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
