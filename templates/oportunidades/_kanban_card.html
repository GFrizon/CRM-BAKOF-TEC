<div class="card mb-2 opportunity-card{% if border_class %} {{ border_class }}{% endif %}" data-id="{{ opp.id }}">
    <div class="card-body p-3">
        <h6 class="card-title mb-2">{{ opp.titulo }}</h6>
        <p class="card-text small text-muted mb-2">{{ opp.cliente }}</p>
        <div class="d-flex justify-content-between align-items-center">
            <small class="text-muted">{{ opp.data_criacao }}</small>
            <div class="dropdown">
                <button class="btn btn-sm btn-outline-secondary" data-bs-toggle="dropdown">
                    <i class="bi bi-three-dots"></i>
                </button>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="{{ url_for('editar_oportunidade', id=opp.id) }}">
                        <i class="bi bi-pencil"></i> Editar
                    </a></li>
                    <li><a class="dropdown-item text-danger" href="#" onclick="excluirOportunidade({{ opp.id }})">
                        <i class="bi bi-trash"></i> Excluir
                    </a></li>
                </ul>
            </div>
        </div>
        {% if opp.valor_estimado > 0 %}
        <div class="mt-2">
            <span class="badge {{ valor_badge_class|default('bg-success') }}">{{ opp.valor_estimado | formatar_dinheiro }}</span>
            <span class="badge {{ prob_badge_class|default('bg-info') }}">
                {% if prob_display is not none %}
                    {{ prob_display }}
                {% else %}
                    {{ opp.probabilidade }}%
                {% endif %}
            </span>
        </div>
        {% endif %}
    </div>
</div>
