<div class="page-header d-flex justify-content-between align-items-center">
  <div>
    <h2><i class="bi bi-funnel text-primary me-2"></i>Pipeline de Oportunidades</h2>
    <p>Gerencie suas oportunidades de vendas</p>
  </div>
  <div class="d-flex gap-2 align-items-center">
    {% if current_user.tipo == 'supervisor' %}
    <div class="form-check form-switch mb-0">
      <input class="form-check-input" type="checkbox" id="minhasOportunidades"
             {% if apenas_minhas %}checked{% endif %}
             onchange="toggleMinhasOportunidades(this.checked)">
      <label class="form-check-label" for="minhasOportunidades">Minhas oportunidades</label>
    </div>
    {% endif %}
    <a href="{{ url_for('nova_oportunidade') }}" class="btn btn-primary">
      <i class="bi bi-plus-circle"></i> Nova Oportunidade
    </a>
  </div>
</div>
