    <!-- Header -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="mb-1">
                        <i class="bi bi-funnel"></i> Pipeline de Oportunidades
                    </h2>
                    <p class="text-muted mb-0">Gerencie suas oportunidades de vendas</p>
                </div>
                <div class="d-flex gap-2">
                    {% if current_user.tipo == 'supervisor' %}
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="minhasOportunidades"
                               {% if apenas_minhas %}checked{% endif %}
                               onchange="toggleMinhasOportunidades(this.checked)">
                        <label class="form-check-label" for="minhasOportunidades">
                            Minhas oportunidades
                        </label>
                    </div>
                    {% endif %}
                    <a href="{{ url_for('nova_oportunidade') }}" class="btn btn-primary">
                        <i class="bi bi-plus-circle"></i> Nova Oportunidade
                    </a>
                </div>
            </div>
        </div>
    </div>
