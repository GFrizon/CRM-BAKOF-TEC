<script>
function excluirOportunidade(id) {
    document.getElementById('formExcluir').action = '/oportunidade/' + id + '/excluir';
    new bootstrap.Modal(document.getElementById('excluirModal')).show();
}

function aplicarFiltroEstagio(estagio) {
    const url = new URL(window.location.href);
    if (estagio) {
        url.searchParams.set('estagio', estagio);
    } else {
        url.searchParams.delete('estagio');
    }
    window.location.href = url.toString();
}

function toggleMinhasOportunidades(ativo) {
    const url = new URL(window.location.href);
    url.searchParams.set('minhas', ativo ? '1' : '0');
    window.location.href = url.toString();
}

// Drag and Drop para mover oportunidades entre estágios
document.addEventListener('DOMContentLoaded', function() {
    const cards = document.querySelectorAll('.opportunity-card');
    const columns = document.querySelectorAll('.kanban-column-body');

    cards.forEach(card => {
        card.draggable = true;

        card.addEventListener('dragstart', function(e) {
            e.dataTransfer.setData('text/plain', this.dataset.id);
            this.style.opacity = '0.5';
        });

        card.addEventListener('dragend', function() {
            this.style.opacity = '';
        });
    });

    columns.forEach(column => {
        column.addEventListener('dragover', function(e) {
            e.preventDefault();
            this.style.backgroundColor = 'var(--brand-50)';
        });

        column.addEventListener('dragleave', function() {
            this.style.backgroundColor = '';
        });

        column.addEventListener('drop', function(e) {
            e.preventDefault();
            this.style.backgroundColor = '';

            const opportunityId = e.dataTransfer.getData('text/plain');
            const estagio = this.dataset.estagio;
            if (!opportunityId || !estagio) return;

            // Fazer requisição AJAX para atualizar estágio
            fetch('/oportunidade/' + opportunityId + '/mover', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    estagio: estagio
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.ok) {
                    location.reload();
                } else {
                    alert('Erro ao mover oportunidade: ' + data.mensagem);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Erro ao mover oportunidade');
            });
        });
    });
});
</script>
