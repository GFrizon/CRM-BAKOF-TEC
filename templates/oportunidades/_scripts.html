<script>
function excluirOportunidade(id) {
    document.getElementById('formExcluir').action = '/oportunidade/' + id + '/excluir';
    new bootstrap.Modal(document.getElementById('excluirModal')).show();
}

// Drag and Drop para mover oportunidades entre estágios
document.addEventListener('DOMContentLoaded', function() {
    const cards = document.querySelectorAll('.opportunity-card');
    const columns = document.querySelectorAll('[style*="overflow-y: auto"]');
    
    cards.forEach(card => {
        card.draggable = true;
        
        card.addEventListener('dragstart', function(e) {
            e.dataTransfer.setData('text/plain', this.dataset.id);
            this.style.opacity = '0.5';
        });
        
        card.addEventListener('dragend', function(e) {
            this.style.opacity = '';
        });
    });
    
    columns.forEach(column => {
        column.addEventListener('dragover', function(e) {
            e.preventDefault();
            this.style.backgroundColor = 'var(--brand-50)';
        });
        
        column.addEventListener('dragleave', function(e) {
            this.style.backgroundColor = '';
        });
        
        column.addEventListener('drop', function(e) {
            e.preventDefault();
            this.style.backgroundColor = '';
            
            const opportunityId = e.dataTransfer.getData('text/plain');
            const estagio = this.closest('.col-md-2').querySelector('h6').textContent.trim().split(' ')[0];
            
            // Mapear nome do estágio para o valor do enum
            const estagioMap = {
                'Prospecçăo': 'prospeccao',
                'Qualificaçăo': 'qualificacao',
                'Proposta': 'proposta',
                'Negociaçăo': 'negociacao',
                'Ganho': 'fechamento_ganho',
                'Perda': 'fechamento_perda'
            };
            
            // Fazer requisiçăo AJAX para atualizar estágio
            fetch('/oportunidade/' + opportunityId + '/mover', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    estagio: estagioMap[estagio]
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.ok) {
                    location.reload();
                } else {
                    alert('Erro ao mover oportunidade: ' + data.mensagem);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Erro ao mover oportunidade');
            });
        });
    });
});
</script>
