.carteiras-shell {
  padding: 9px 12px 10px;
  background: linear-gradient(180deg, #eef5ff 0%, #e5edf8 100%);
  border: 1px solid #b8c8df;
  border-left: 5px solid #2563eb;
  border-radius: 9px;
  box-shadow: 0 4px 12px rgba(15, 23, 42, .06), 0 1px 0 rgba(255,255,255,.75) inset;
}

.carteiras-header {
  display: flex;
  align-items: center;
  margin-bottom: 7px;
  padding: 0;
}

.carteiras-title {
  font-size: .72rem;
  font-weight: 800;
  letter-spacing: .09em;
  text-transform: uppercase;
  color: #1e3a8a;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  line-height: 1;
}

.carteiras-title i {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  border-radius: 5px;
  background: #dbeafe;
  color: #1d4ed8;
  font-size: .78rem;
}

body {
  transition: opacity .12s ease;
}
body.tab-switching {
  opacity: .98;
}
body.tab-switching .carteiras-shell {
  position: relative;
  overflow: hidden;
}
body.tab-switching .carteiras-shell::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent 0%, #2563eb 22%, #38bdf8 50%, #2563eb 78%, transparent 100%);
  transform: translateX(-100%);
  animation: carteiraLoadingBar 1.05s ease-in-out infinite;
  z-index: 2;
}
body.tab-switching .carteiras-shell .carteiras-title,
body.tab-switching .carteiras-shell .modern-tabs .nav-link {
  opacity: .58;
}
body.tab-switching .carteiras-shell .modern-tabs .nav-link {
  position: relative;
  overflow: hidden;
  pointer-events: none;
}
body.tab-switching .carteiras-shell .modern-tabs .nav-link::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(110deg, transparent 0%, rgba(255,255,255,.62) 45%, transparent 72%);
  transform: translateX(-120%);
  animation: carteiraTabShimmer 1.15s ease-in-out infinite;
}
.tab-switch-skeleton {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 4px;
  z-index: 9999;
  pointer-events: none;
  background: transparent;
  overflow: hidden;
}
.tab-switch-skeleton-top {
  width: 34%;
  height: 100%;
  border-radius: 0 2px 2px 0;
  background: linear-gradient(90deg, #1d4ed8 0%, #60a5fa 100%);
  animation: skeletonShimmer 900ms ease-in-out infinite;
}
.tab-switch-skeleton-body {
  display: none;
}
@keyframes skeletonShimmer {
  0% { transform: translateX(-110%); opacity: .9; }
  100% { transform: translateX(320%); opacity: 1; }
}
@keyframes carteiraLoadingBar {
  0% { transform: translateX(-100%); }
  55% { transform: translateX(20%); }
  100% { transform: translateX(100%); }
}
@keyframes carteiraTabShimmer {
  0% { transform: translateX(-120%); opacity: .1; }
  45% { opacity: .9; }
  100% { transform: translateX(120%); opacity: .1; }
}
@media (max-width: 768px) {

}
