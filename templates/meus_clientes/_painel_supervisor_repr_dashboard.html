{% if current_user.tipo == 'supervisor_repr' %}
<div class="panel-card mb-4">
  <div class="panel-header">
    <i class="bi bi-speedometer2"></i>
    <span>Resumo rápido - Supervisor de Representante</span>
  </div>
  <div class="panel-body">
    <div class="row g-3">
      <div class="col-6 col-md-3">
        <div class="card stat-card h-100">
          <div class="card-body">
            <div class="d-flex align-items-center justify-content-between">
              <span class="text-muted">Sem pedido 90-150d</span>
              <i class="bi bi-database"></i>
            </div>
            <div class="stat-value">{{ total_oracle or 0 }}</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card stat-card h-100">
          <div class="card-body">
            <div class="d-flex align-items-center justify-content-between">
              <span class="text-muted">Próx. inativação</span>
              <i class="bi bi-exclamation-triangle"></i>
            </div>
            <div class="stat-value">{{ total_proximos or 0 }}</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card stat-card h-100">
          <div class="card-body">
            <div class="d-flex align-items-center justify-content-between">
              <span class="text-muted">Contatados</span>
              <i class="bi bi-check2-circle"></i>
            </div>
            <div class="stat-value">{{ total_contatados or 0 }}</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card stat-card h-100">
          <div class="card-body">
            <div class="d-flex align-items-center justify-content-between">
              <span class="text-muted">Retornar</span>
              <i class="bi bi-arrow-return-right"></i>
            </div>
            <div class="stat-value">{{ total_retornar or 0 }}</div>
          </div>
        </div>
      </div>
    </div>

    <div class="d-flex flex-wrap gap-2 mt-3">
      <a class="btn btn-sm btn-primary" href="{{ url_for('meus_clientes', visao='clientes', aba='oracle') }}">
        <i class="bi bi-list-ul me-1"></i>Ver 90-150d
      </a>
      <a class="btn btn-sm btn-outline-warning" href="{{ url_for('meus_clientes', visao='clientes', aba='proximos_inativacao') }}">
        <i class="bi bi-list-ul me-1"></i>Ver próximos
      </a>
    </div>
  </div>
</div>
{% endif %}
