<script>

let modalLigacao = null;

let modalLimpar = null;
let modalAdicionar = null;
let modalEditarObs = null;

function _criarModalSeExistir(elementId) {
  const el = document.getElementById(elementId);
  if (!el) return null;
  return bootstrap.Modal.getOrCreateInstance(el);
}

function inicializarModaisPagina() {
  modalLigacao = _criarModalSeExistir('modalLigacao');
  modalHistorico = _criarModalSeExistir('modalHistorico');
  modalLimpar = _criarModalSeExistir('modalLimpar');

  modalEditarLigacao = _criarModalSeExistir('modalEditarLigacao');
}

inicializarModaisPagina();

function mostrarToastMensagem(msg, tipo = 'success') {
  const id = 'toast-status-codex';
  let el = document.getElementById(id);
  if (!el) {
    const wrap = document.createElement('div');
    wrap.className = 'toast-container position-fixed top-0 end-0 p-3';
    wrap.style.zIndex = '1200';
    wrap.innerHTML = `
      <div id="${id}" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
          <div class="toast-body fw-semibold"></div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Fechar"></button>
        </div>
      </div>`;
    document.body.appendChild(wrap);
    el = document.getElementById(id);
  }
  const body = el.querySelector('.toast-body');
  if (body) body.textContent = msg || 'Operacao concluida.';
  el.classList.remove('text-bg-success', 'text-bg-danger', 'text-bg-primary');
  el.classList.add(tipo === 'error' ? 'text-bg-danger' : (tipo === 'info' ? 'text-bg-primary' : 'text-bg-success'));
  bootstrap.Toast.getOrCreateInstance(el, { delay: 2200 }).show();
}

function abrirForm(id, nome, telefone, cdClienteOracle = '') {
  document.getElementById('cliId').value = id;
  let row = id ? document.querySelector(`tr[data-cliente-id="${id}"]`) : null;

    row = document.querySelector(`tr[data-cd-cliente-oracle="${cdClienteOracle}"]`);

  const cdNaLinha = row ? (row.getAttribute('data-cd-cliente-oracle') || '').trim() : '';
  document.getElementById('cliCdClienteOracle').value = (cdClienteOracle || cdNaLinha || '').toString().trim();

  document.getElementById('cliTelefone').value = telefone || '';

  document.getElementById('resultado').value = 'nao_comprou';
  document.getElementById('valor_venda').value = '';
  document.getElementById('observacao').value = '';
  document.getElementById('dias_retorno').value = '';
  document.getElementById('data_retorno').value = '';

  modalLigacao.show();
}

function toggleCamposResultado() {
  const r = document.getElementById('resultado').value;
  const boxValor   = document.getElementById('valorContainer');
  const boxRetorno = document.getElementById('retornoContainer');
  if (r === 'comprou') {
    boxValor.style.display = 'block';
    document.getElementById('valor_venda').required = true;
  } else {
    boxValor.style.display = 'none';
    document.getElementById('valor_venda').required = false;
    document.getElementById('valor_venda').value = '';
  }
  // Mostrar campos de retorno para QUALQUER resultado (opcional)
  boxRetorno.style.display = 'block';
}

// HISTÓRICO COM BOTÃO DE EDITAR
function historico(id) {
  modalHistorico.show();
  fetch(`/historico-ligacoes/${id}`)
    .then(r => r.json())
    .then(hist => {
      const div = document.getElementById('historicoContent');
      if (!hist || hist.length === 0) {
        div.innerHTML = '<p class="text-muted text-center py-3">Nenhum registro de ligação.</p>';
        return;
      }
      let html = '<div style="display:flex;flex-direction:column;gap:10px;">';
      hist.forEach(item => {
        html += `
          <div style="border:1px solid var(--border);border-radius:8px;padding:14px 16px;background:var(--surface-2);">
            <div class="d-flex justify-content-between align-items-start">
              <div class="flex-grow-1">
                <div style="font-size:.82rem;font-weight:700;color:var(--text-1);">${item.data_hora}</div>
                <div style="font-size:.78rem;color:var(--text-2);margin-top:2px;">${item.consultor}</div>
                <div class="mt-2 d-flex gap-2 flex-wrap">
                  <span class="badge-count" style="font-size:.7rem;">${item.resultado}</span>
                  ${item.contato_nome ? `<span style="font-size:.75rem;color:var(--text-2);">Contato: ${item.contato_nome}</span>` : ''}
                  ${item.valor_venda !== 'R$ 0,00' ? `<span style="font-size:.75rem;font-weight:700;color:#16a34a;">${item.valor_venda}</span>` : ''}
                </div>
                ${item.observacao ? `<div style="margin-top:8px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:6px;font-size:.8rem;color:var(--text-2);">${item.observacao}</div>` : ''}
              </div>
              ${item.pode_editar ? `
                <button class="action-btn btn btn-outline-primary ms-2" onclick="editarLigacaoCompleta(${item.id})">
                  <i class="bi bi-pencil-square"></i>
                </button>` : ''}
            </div>
          </div>
        `;
      });
      html += '</div>';
      div.innerHTML = html;
    })
    .catch(() => {
      document.getElementById('historicoContent').innerHTML =
        '<p class="text-danger">Erro ao carregar Histórico.</p>';
    });
}

// ABRIR MODAL DE EDIÇÃO COMPLETA
async function editarLigacaoCompleta(ligacaoId) {
  try {
    const r = await fetch(`/api/detalhes-ligacao/${ligacaoId}`);
    const data = await r.json();
    if (!r.ok) { alert(data.erro || 'Erro ao carregar dados da ligação'); return; }
    document.getElementById('editLigacaoId').value  = data.id;
    document.getElementById('editResultado').value  = data.resultado;
    document.getElementById('editValorVenda').value = data.valor_venda_fmt.replace('R$ ', '');
    document.getElementById('editObservacao').value = data.observacao || '';
    document.getElementById('editDataHora').textContent    = data.data_hora;
    document.getElementById('editContatoNome').textContent = data.contato_nome || 'N/A';
    toggleEditValorContainer();
    document.getElementById('editResultado').onchange = toggleEditValorContainer;
    modalHistorico.hide();
    modalEditarLigacao.show();
  } catch (erro) {
    console.error('Erro:', erro);
    alert('Erro ao carregar dados da ligação');
  }
}

async function garantirClienteLocalEAbrirForm(clienteOracle) {
  try {
    const r = await fetch('/garantir-cliente-local-oracle', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': getCookie('csrf_token')
      },
      body: JSON.stringify(clienteOracle || {})
    });

    const data = await r.json();
    if (!data.success || !data.cliente || !data.cliente.id) {
      alert(data.message || 'Nao foi possivel preparar o cliente para ligacao.');
      return;
    }

    abrirForm(
      data.cliente.id,
      data.cliente.nome || (clienteOracle && clienteOracle.nome) || 'Cliente',
      data.cliente.telefone || (clienteOracle && (clienteOracle.telefone || clienteOracle.telefone2)) || '',
      (clienteOracle && clienteOracle.cd_cliente_oracle) || ''
    );
  } catch (erro) {
    console.error('Erro ao garantir cliente local:', erro);
    alert('Erro ao preparar cliente para ligacao.');
  }
}

// Salvar ligação
async function salvarLigacao(e) {
  e.preventDefault();
  const id = document.getElementById('cliId').value;
  const cdClienteOracle = (document.getElementById('cliCdClienteOracle').value || '').trim();
  const payload = {
    contato_nome: document.getElementById('contato_nome').value,
    resultado:    document.getElementById('resultado').value,
    valor_venda:  document.getElementById('valor_venda').value,
    observacao:   document.getElementById('observacao').value
  };
  // Enviar campos de retorno para QUALQUER resultado (se preenchidos)
  const dias = parseInt(document.getElementById('dias_retorno').value || '0', 10);
  const data = document.getElementById('data_retorno').value;
  if (data)              { payload.data_retorno  = data; }
  else if (!isNaN(dias) && dias > 0) { payload.dias_retorno = dias; }
  const r = await fetch(`/registrar-ligacao/${id}`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  });
  const j = await r.json();
  if (j.ok) { 
    modalLigacao.hide(); 
    mostrarToastMensagem(j.mensagem || 'Ligacao registrada!', 'success');
    _cacheAbasLimpar();

    const retornoAgendado = Boolean(j.proxima_ligacao || payload.data_retorno || payload.dias_retorno);

    // Na aba Oracle (90-150d), manter cliente na lista e apenas atualizar status local.
    if (ABA_ATUAL === 'oracle') {
      _atualizarLinhaEmPlace(id, j.proxima_ligacao, cdClienteOracle);
      const abaDestino = retornoAgendado ? 'retornar' : 'contatados';
      _ajustarContadorAba(abaDestino, +1);
      _destacarAbaDestino(abaDestino);
      atualizarInfoQuickActions();
      atualizarBadgesAbasAssincrono();
      return;
    }

    // Abas de carteira: cliente permanece na lista e atualiza localmente.
    if (ABA_ATUAL === 'inativos' ||
        ABA_ATUAL === 'pendentes' || ABA_ATUAL === 'proximos_inativacao') {
      _atualizarLinhaEmPlace(id, retornoAgendado ? j.proxima_ligacao : null, cdClienteOracle);
      const abaDestino = retornoAgendado ? 'retornar' : 'contatados';
      _ajustarContadorAba(abaDestino, +1);
      _destacarAbaDestino(abaDestino);
      atualizarInfoQuickActions();
      atualizarBadgesAbasAssincrono();
      return;
    }

    // Aba Contatados: move para Retornar se agendou retorno, senao atualiza in-place
    if (ABA_ATUAL === 'contatados') {
      if (retornoAgendado) {
        _removerClienteDaTela(id);
        _ajustarContadorAba('contatados', -1);
        _ajustarContadorAba('retornar', +1);
        _destacarAbaDestino('retornar');
      } else {
        _atualizarLinhaEmPlace(id, null, cdClienteOracle);
      }
      atualizarInfoQuickActions();
      atualizarBadgesAbasAssincrono();
      return;
    }

    // Aba Retornar: move para Contatados se nao agendou retorno, senao atualiza in-place
    if (ABA_ATUAL === 'retornar') {
      if (retornoAgendado) {
        _atualizarLinhaEmPlace(id, j.proxima_ligacao, cdClienteOracle);
      } else {
        _removerClienteDaTela(id);
        _ajustarContadorAba('retornar', -1);
        _ajustarContadorAba('contatados', +1);
        _destacarAbaDestino('contatados');
      }
      atualizarInfoQuickActions();
      atualizarBadgesAbasAssincrono();
      return;
    }

    location.reload();
  }
  else       { alert(j.mensagem || 'Erro ao registrar ligação'); }
}

function limpaDigitos(v) { return (v || '').replace(/\D+/g, ''); }

function formatarCnpj(v) {
  const d = limpaDigitos(v).slice(0, 14);
  if (d.length <= 2) return d;
  if (d.length <= 5) return `${d.slice(0, 2)}.${d.slice(2)}`;
  if (d.length <= 8) return `${d.slice(0, 2)}.${d.slice(2, 5)}.${d.slice(5)}`;
  if (d.length <= 12) return `${d.slice(0, 2)}.${d.slice(2, 5)}.${d.slice(5, 8)}/${d.slice(8)}`;
  return `${d.slice(0, 2)}.${d.slice(2, 5)}.${d.slice(5, 8)}/${d.slice(8, 12)}-${d.slice(12)}`;
}

function ativarMascaraCnpjNovoCliente() {
  const el = document.getElementById('novo_cnpj');
  if (!el || el.dataset.maskReady === '1') return;
  el.dataset.maskReady = '1';
  el.addEventListener('input', () => {
    el.value = formatarCnpj(el.value);
  });
  el.addEventListener('blur', () => {
    el.value = formatarCnpj(el.value);
  });
}

async function buscarCnpjOracle() {
  const cnpjInput = document.getElementById('novo_cnpj');
  const statusEl = document.getElementById('novo_oracle_status');
  const botao = document.getElementById('btn_buscar_oracle_cnpj');
  const cnpj = limpaDigitos(cnpjInput.value);

  if (!cnpj || cnpj.length < 7) {
    if (statusEl) statusEl.textContent = 'Informe um CNPJ valido (minimo 7 digitos) para buscar no Oracle.';
    return;
  }

  if (statusEl) statusEl.textContent = 'Buscando no Oracle...';
  if (botao) botao.disabled = true;

  try {
    const r = await fetch('/clientes/preencher-oracle-cnpj', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ cnpj })
    });
    const j = await r.json();

    if (!r.ok || !j.ok) {
      if (statusEl) statusEl.textContent = j.mensagem || 'Erro ao consultar Oracle.';
      return;
    }

    if (!j.encontrado) {
      if (statusEl) statusEl.textContent = j.mensagem || 'CNPJ nao encontrado no Oracle.';
      return;
    }

    const d = j.dados || {};
    document.getElementById('novo_nome').value = (d.nome || '').toUpperCase();
    document.getElementById('novo_cnpj').value = formatarCnpj(d.cnpj || cnpj);
    document.getElementById('novo_telefone').value = d.telefone || d.telefone2 || '';
    document.getElementById('novo_representante').value = (d.representante_nome || '').toUpperCase();
    document.getElementById('novo_cd_cliente_oracle').value = d.cd_cliente_oracle || '';
    document.getElementById('novo_telefone2').value = d.telefone2 || '';
    document.getElementById('novo_representante_oracle').value = d.representante_oracle || '';
    document.getElementById('novo_categoria_consultor').value = d.categoria_consultor || '';
    document.getElementById('novo_conceito').value = d.conceito || '';
    document.getElementById('novo_municipio').value = d.municipio || '';
    document.getElementById('novo_uf').value = d.uf || '';
    document.getElementById('novo_contato').value = d.contato || '';

    {% if is_supervisor %}
    const consultorSelect = document.getElementById('novo_consultor');
    if (consultorSelect && d.consultor_id_sugerido) {
      consultorSelect.value = String(d.consultor_id_sugerido);
    }
    {% endif %}

    if (statusEl) {
      const sufixo = d.consultor_nome_sugerido ? ` Consultor sugerido: ${d.consultor_nome_sugerido}.` : '';
      statusEl.textContent = `Dados preenchidos a partir do Oracle.${sufixo}`;
    }
  } catch (erro) {
    console.error('Erro ao buscar CNPJ no Oracle:', erro);
    if (statusEl) statusEl.textContent = 'Erro ao consultar Oracle.';
  } finally {
    if (botao) botao.disabled = false;
  }
}

async function salvarCliente(e) {
  e.preventDefault();
  const nome = document.getElementById('novo_nome').value.trim().toUpperCase();
  if (!nome) return alert("Informe o nome");
  const payload = {
    nome,
    cnpj: limpaDigitos(document.getElementById('novo_cnpj').value),
    telefone: limpaDigitos(document.getElementById('novo_telefone').value),
    telefone2: limpaDigitos(document.getElementById('novo_telefone2').value),
    representante_nome: document.getElementById('novo_representante').value.trim().toUpperCase(),
    cd_cliente_oracle: document.getElementById('novo_cd_cliente_oracle').value.trim(),
    representante_oracle: document.getElementById('novo_representante_oracle').value.trim(),
    categoria_consultor: document.getElementById('novo_categoria_consultor').value.trim(),
    conceito: document.getElementById('novo_conceito').value.trim(),
    municipio: document.getElementById('novo_municipio').value.trim(),
    uf: document.getElementById('novo_uf').value.trim(),
    contato: document.getElementById('novo_contato').value.trim()
  };
  {% if is_supervisor %}
  const cons = document.getElementById('novo_consultor').value;
  if (!cons) return alert("Selecione o consultor");
  payload.consultor_id = parseInt(cons);
  {% endif %}
  const r = await fetch('/clientes/criar', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  });
  const j = await r.json();
  if (j.ok) { _cacheAbasLimpar(); modalAdicionar.hide(); alert(j.mensagem || "Cliente criado!"); location.reload(); }
  else       { alert(j.mensagem || "Erro ao criar"); }
}

function filtrarPorOrigem() {
  const seletor = document.getElementById('filtroOrigem');
  if (!seletor) return;
  const v = seletor.value;
  const rows = _linhasClientesTabela();
  rows.forEach(tr => {
    const o = tr.getAttribute('data-origem') || '';
    tr.style.display = (!v || v === o) ? '' : 'none';
  });
  atualizarInfoQuickActions();
}

function _ajustarContadorAba(abaKey, delta) {
  if (!delta) return;
  document.querySelectorAll(`.modern-tabs .nav-link[data-aba="${abaKey}"]`).forEach((link) => {
    const count = link.querySelector('.tab-count');
    if (!count) return;
    const atual = parseInt((count.textContent || '0').replace(/\D+/g, ''), 10) || 0;
    count.textContent = String(Math.max(0, atual + delta));
  });
}

function _definirContadorAba(abaKey, valor) {
  const normalizado = Math.max(0, parseInt(valor, 10) || 0);
  document.querySelectorAll(`.modern-tabs .nav-link[data-aba="${abaKey}"]`).forEach((link) => {
    const count = link.querySelector('.tab-count');
    if (!count) return;
    count.textContent = String(normalizado);
  });
}

async function atualizarBadgesAbasAssincrono() {
  if (DASHBOARD_TIPO) return;
  try {
    const params = new URLSearchParams({
      aba: ABA_ATUAL || '',
      meus: APENAS_MEUS ? '1' : '0',
    });
    const r = await fetch(`/api/clientes/badges?${params.toString()}`, {
      headers: { 'Accept': 'application/json' },
    });
    const j = await r.json();
    if (!j || !j.ok || !j.badges) return;
    const b = j.badges;
    _definirContadorAba('pendentes', b.pendentes);
    _definirContadorAba('contatados', b.contatados);
    _definirContadorAba('retornar', b.retornar);
    // Na aba Oracle, preserva o contador renderizado no servidor
    // para manter consist?ncia com o painel de estat?sticas exibido.
    if (ABA_ATUAL !== 'oracle') {
      _definirContadorAba('oracle', b.oracle);
    }
    _definirContadorAba('inativos', b.inativos);
    _definirContadorAba('proximos_inativacao', b.proximos_inativacao);
  } catch (erro) {
    console.warn('Falha ao atualizar badges das abas:', erro);
  }
}

function _mostrarSkeletonTrocaAba() {
  if (document.getElementById('tabSwitchSkeleton')) return;
  const wrap = document.createElement('div');
  wrap.id = 'tabSwitchSkeleton';
  wrap.className = 'tab-switch-skeleton';
  wrap.innerHTML = '<div class="tab-switch-skeleton-top"></div><div class="tab-switch-skeleton-body"></div>';
  document.body.appendChild(wrap);
}

function _removerSkeletonTrocaAba() {
  const el = document.getElementById('tabSwitchSkeleton');
  if (el) el.remove();
  document.body.classList.remove('tab-switching');
}

function _normalizarHrefAba(href) {
  try {
    return new URL(href, window.location.origin).toString();
  } catch (_) {
    return String(href || '');
  }
}

function _resolverAbaDoHref(href) {
  try {
    const u = new URL(_normalizarHrefAba(href));
    return String(u.searchParams.get('aba') || '').trim();
  } catch (_) {
    return '';
  }
}

function _ttlCacheParaAba(aba) {
  const key = String(aba || '').trim();
  if (key === 'oracle') return 6000;
  if (key === 'inativos' || key === 'proximos_inativacao') return 8000;
  if (key === 'pendentes' || key === 'contatados' || key === 'retornar') return 15000;
  return TAB_HTML_CACHE_TTL_DEFAULT_MS;
}

function _cacheAbaGet(href) {
  const key = _normalizarHrefAba(href);
  const item = _tabHtmlCache.get(key);
  if (!item) return null;
  const ttl = parseInt(item.ttl || TAB_HTML_CACHE_TTL_DEFAULT_MS, 10) || TAB_HTML_CACHE_TTL_DEFAULT_MS;
  if ((Date.now() - item.ts) > ttl) {
    _tabHtmlCache.delete(key);
    return null;
  }
  return item.html || null;
}

function _cacheAbaSet(href, html) {
  const key = _normalizarHrefAba(href);
  if (!key || !html) return;
  const aba = _resolverAbaDoHref(key);
  const ttl = _ttlCacheParaAba(aba);
  _tabHtmlCache.set(key, { html, ts: Date.now(), ttl });
}

function _cacheAbasLimpar() {
  _tabHtmlCache.clear();
}

async function _baixarHtmlAba(href) {
  const url = _normalizarHrefAba(href);
  const response = await fetch(url, {
    headers: {
      'Accept': 'text/html',
      'X-Requested-With': 'fetch-tab',
    },
    credentials: 'same-origin',
  });
  if (!response.ok) throw new Error(`HTTP ${response.status}`);
  const html = await response.text();
  _cacheAbaSet(url, html);
  return html;
}

function _prefetchAba(href) {
  const url = _normalizarHrefAba(href);
  if (!url) return;
  if (_cacheAbaGet(url)) return;
  if (_tabPrefetchInflight.has(url)) return;
  const p = _baixarHtmlAba(url).catch(() => null).finally(() => {
    _tabPrefetchInflight.delete(url);
  });
  _tabPrefetchInflight.set(url, p);
}

function _atualizarAbaAtualPeloDOM() {
  const root = document.getElementById('meusClientesRoot');
  if (root && root.dataset.abaAtual) {
    ABA_ATUAL = root.dataset.abaAtual;
    return;
  }
  const ativa = document.querySelector('.modern-tabs .nav-link.active[data-aba]');
  if (ativa && ativa.dataset.aba) ABA_ATUAL = ativa.dataset.aba;
}

function _rebindPosTrocaParcial() {
  inicializarModaisPagina();
  _atualizarAbaAtualPeloDOM();
  _habilitarTransicaoAbas();
  _iniciarDebounceFiltros();
  _restaurarGruposAbertos();
  atualizarInfoQuickActions();
  atualizarBadgesAbasAssincrono();
  if (ABA_ATUAL === 'inativos') {
    sincronizarIndicadoresInativos();
  }
}

async function _navegarAbaComFetch(href) {
  if (_tabFetchEmAndamento) return;
  _tabFetchEmAndamento = true;
  document.body.classList.add('tab-switching');
  try {
    let html = _cacheAbaGet(href);
    if (!html) {
      _mostrarSkeletonTrocaAba();
      const inflight = _tabPrefetchInflight.get(_normalizarHrefAba(href));
      html = inflight ? (await inflight) : (await _baixarHtmlAba(href));
    }
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const novoRoot = doc.getElementById('meusClientesRoot');
    const atualRoot = document.getElementById('meusClientesRoot');
    if (!novoRoot || !atualRoot) throw new Error('Root parcial nao encontrado');

    atualRoot.replaceWith(novoRoot);
    history.pushState({ tipo: 'aba' }, '', href);
    _rebindPosTrocaParcial();
    _removerSkeletonTrocaAba();
  } catch (erro) {
    console.warn('Falha na troca de aba por fetch, aplicando fallback:', erro);
    window.location.href = href;
  } finally {
    _tabFetchEmAndamento = false;
  }
}

function _destacarAbaDestino(abaKey) {

  });
}

function _removerClienteDaTela(clienteId, cdClienteOracle = '') {

    ...(cd ? Array.from(document.querySelectorAll(`tr[data-cd-cliente-oracle="${cd}"]`)) : []),

  rowsUnicos.forEach((row) => {

function _habilitarTransicaoAbas() {
  document.querySelectorAll('.modern-tabs .nav-link[data-aba]').forEach((link) => {
    if (link.dataset.tabTransitionBound === '1') return;
    link.dataset.tabTransitionBound = '1';
    const href = link.getAttribute('href');
    if (href) {
      link.addEventListener('mouseenter', () => _prefetchAba(href), { passive: true });
      link.addEventListener('focus', () => _prefetchAba(href), { passive: true });
      link.addEventListener('touchstart', () => _prefetchAba(href), { passive: true, once: true });
    }
    link.addEventListener('click', (ev) => {
      if (ev.defaultPrevented) return;
      if (ev.button !== 0) return;
      if (ev.metaKey || ev.ctrlKey || ev.shiftKey || ev.altKey) return;
      const hrefLocal = link.getAttribute('href');
      if (!hrefLocal || link.classList.contains('active')) return;
      ev.preventDefault();
      _navegarAbaComFetch(hrefLocal);
    });
  });
}

function _atualizarLinhaEmPlace(clienteId, novaProximaLigacaoIso, cdClienteOracle = '') {
  const id = String(clienteId || '').trim();
  const cd = String(cdClienteOracle || '').trim();
  if (!id && !cd) return;
  const rowAtivaValida = _rowLigacaoAtiva && document.body.contains(_rowLigacaoAtiva) ? _rowLigacaoAtiva : null;
  const rows = [
    ...(rowAtivaValida ? [rowAtivaValida] : []),
    ...(id ? Array.from(document.querySelectorAll(`tr[data-cliente-id="${id}"]`)) : []),
    ...(cd ? Array.from(document.querySelectorAll(`tr[data-cd-cliente-oracle="${cd}"]`)) : []),
  ];
  const rowsUnicos = Array.from(new Set(rows));
  const row = rowsUnicos.length ? rowsUnicos[0] : null;
  if (!row) return;

  const totalAtual = parseInt(row.dataset.totalLigacoes || '0', 10);
  const novoTotal = totalAtual + 1;
  row.dataset.totalLigacoes = String(novoTotal);
  const badge = row.querySelector('.badge-count');
  if (badge) badge.textContent = String(novoTotal);
  _garantirBotaoHistoricoNaLinha(row, id);

  const agora = new Date();
  const p2 = n => String(n).padStart(2, '0');
  const isoStr = `${agora.getFullYear()}-${p2(agora.getMonth()+1)}-${p2(agora.getDate())} ${p2(agora.getHours())}:${p2(agora.getMinutes())}:${p2(agora.getSeconds())}`;
  const fmtDt  = d => `${p2(d.getDate())}/${p2(d.getMonth()+1)}/${d.getFullYear()} ${p2(d.getHours())}:${p2(d.getMinutes())}`;

  row.dataset.ultimaLigacao = isoStr;
  const tdUltima = row.querySelector('td[data-col="ultima-ligacao"]');
  if (tdUltima) tdUltima.innerHTML = `<span style="font-size:.8rem;">${fmtDt(agora)}</span>`;

  if (novaProximaLigacaoIso !== undefined) {
    try {
      if (novaProximaLigacaoIso) {
        const proxData = new Date(novaProximaLigacaoIso);
        if (!isNaN(proxData.getTime())) {
          row.dataset.proximaLigacao = novaProximaLigacaoIso.replace('T', ' ').slice(0, 19);
          const atrasado = agora >= proxData;
          row.dataset.retornoAtrasado = atrasado ? '1' : '0';
          const tdProxima = row.querySelector('td[data-col="proxima-ligacao"]');
          if (tdProxima) {
            const fmtProx = fmtDt(proxData);
            tdProxima.innerHTML = atrasado
              ? `<span class="text-danger fw-bold" style="font-size:.8rem;"><i class="bi bi-exclamation-triangle-fill me-1"></i>${fmtProx}</span>`
              : `<span style="font-size:.8rem;">${fmtProx}</span>`;
          }
        }
      } else {
        row.dataset.proximaLigacao = '';
        row.dataset.retornoAtrasado = '0';
        const tdProxima = row.querySelector('td[data-col="proxima-ligacao"]');
        if (tdProxima) tdProxima.innerHTML = '-';
      }
    } catch (_) {}
  }

  atualizarIndicadorRetornoNaLinha(row, row.dataset.proximaLigacao || '');
}

function _garantirBotaoHistoricoNaLinha(row, clienteId) {
  if (!row) return;
  const id = parseInt(String(clienteId || '0'), 10);
  if (!Number.isFinite(id) || id <= 0) return;

  const acoes = row.querySelector('.col-acoes .d-flex.gap-1, td:last-child .d-flex.gap-1');
  if (!acoes) return;

  const jaTemHistorico = acoes.querySelector('button[title="Historico"], button[title="Histórico"]');
  if (jaTemHistorico) return;

  const btn = document.createElement('button');
  btn.className = 'action-btn btn btn-outline-secondary';
  btn.setAttribute('title', 'Historico');
  btn.innerHTML = '<i class="bi bi-clock-history"></i>';
  btn.addEventListener('click', () => historico(id));
  acoes.appendChild(btn);
}

function atualizarIndicadorRetornoNaLinha(row, proximaLigacaoIso) {
  if (!row) return;
  const statusCell = row.querySelector('.col-status > div');

  const host = statusCell || countCell;

  const valor = String(proximaLigacaoIso || '').trim();
  const totalLigacoes = parseInt(row.dataset.totalLigacoes || '0', 10) || 0;

}

  let numero = (telefone || '').toString().replace(/\D+/g, '');

  numero = numero.replace(/^0+/, '');
  if (!numero.startsWith('55')) numero = `55${numero}`;
  return numero;
}

  const numero = normalizarNumeroWhatsApp(telefone);
  if (!numero) {
    alert('Telefone inv?lido para WhatsApp.');

  // Usa clique sint?tico em anchor para evitar bloqueio de popup.

  a.target = '_blank';
  a.rel = 'noopener noreferrer';

const APENAS_MEUS = {{ 'true' if current_user.tipo in ('consultor', 'televendas') else 'false' }};
const DASHBOARD_TIPO = '{{ request.args.get("dashboard_tipo", "")|e }}';
const STORAGE_OPEN_GROUPS_KEY = 'meus_clientes_open_groups_v1';
let _tabFetchEmAndamento = false;
const TAB_HTML_CACHE_TTL_DEFAULT_MS = 12000;
const _tabHtmlCache = new Map();
const _tabPrefetchInflight = new Map();

async function reservarAtendimentoCliente(clienteId, { forcar = false, aba = '', cdClienteOracle = '' } = {}) {
  const id = Number(clienteId);
  if (!Number.isFinite(id) || id <= 0) return false;

  try {
    const r = await fetch(`/api/clientes/${id}/iniciar-contato`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': getCookie('csrf_token')
      },
      body: JSON.stringify({
        forcar: !!forcar,
        aba: aba || '',
        cd_cliente_oracle: (cdClienteOracle || '').toString().trim()
      })
    });

    let j = {};
    try {
      j = await r.json();
    } catch (_) {
      return false;
    }

    if (!j.ok && j.bloqueado && !forcar) {
      const msg = `${j.em_atendimento_por_nome || 'Outro usuario'} esta atendendo este cliente.\n\nDeseja assumir mesmo assim`;
      if (confirm(msg)) {
        return await reservarAtendimentoCliente(id, { forcar: true, aba, cdClienteOracle });
      }
      return false;
    }

    if (!j.ok) {
      alert(j.mensagem || 'Nao foi possivel reservar o cliente.');
      return false;
    }

    return j;
  } catch (erro) {
    console.warn('Nao foi possivel reservar atendimento:', erro);
    return false;
  }
}

function marcarEmAtendimentoNoDOM({ clienteId, cdClienteOracle = '', porNome = 'Outro usuario', ate = '' }) {
  const id = Number(clienteId);
  const seletorPorId = Number.isFinite(id) && id > 0 ? `tr[data-cliente-id="${id}"]` : null;
  const seletorPorCd = cdClienteOracle ? `tr[data-cd-cliente-oracle="${cdClienteOracle}"]` : null;
  const rows = [
    ...(seletorPorId ? document.querySelectorAll(seletorPorId) : []),
    ...(seletorPorCd ? document.querySelectorAll(seletorPorCd) : []),
  ];
  if (!rows.length) return;

  rows.forEach((row) => atualizarIndicadorAtendimentoNaLinha(row, {
    ativo: true,
    por_nome: porNome,
    ate
  }));
}

function atualizarIndicadorAtendimentoNaLinha(row, lockInfo) {
  if (!row) return;
  const statusCell = row.querySelector('.col-status > div');

  indicador.title = `Em atendimento por ${porNome}${ate ? ` ate ${ate}` : ''}`;
}

let _syncLocksInativosTimer = null;
let _syncLocksInativosBusy = false;

async function sincronizarIndicadoresInativos() {
  if (ABA_ATUAL !== 'inativos') return;
  if (_syncLocksInativosBusy) return;

  const rows = Array.from(document.querySelectorAll('tr[data-cd-cliente-oracle]'))
    .filter((row) => (row.getAttribute('data-cd-cliente-oracle') || '').trim().length > 0);
  if (!rows.length) return;

  const cds = Array.from(new Set(
    rows.map((row) => (row.getAttribute('data-cd-cliente-oracle') || '').trim()).filter(Boolean)
  ));
  if (!cds.length) return;

  _syncLocksInativosBusy = true;
  try {
    const r = await fetch('/api/inativos/locks', {
      method: 'POST',
      headers: {
        'Accept': 'application/json',
        'Content-Type': 'application/json',
        'X-CSRFToken': getCookie('csrf_token')
      },
      body: JSON.stringify({ cds })
    });
    const j = await r.json();
    if (!j || !j.ok) return;

    const locks = j.locks || {};
    rows.forEach((row) => {
      const cd = (row.getAttribute('data-cd-cliente-oracle') || '').trim();
      atualizarIndicadorAtendimentoNaLinha(row, cd ? (locks[cd] || null) : null);
    });
  } catch (erro) {
    console.warn('Falha ao sincronizar locks dos inativos:', erro);
  } finally {
    _syncLocksInativosBusy = false;
  }
}

function iniciarAutoSyncIndicadoresInativos() {
  if (ABA_ATUAL !== 'inativos') return;
  if (_syncLocksInativosTimer) return;

  sincronizarIndicadoresInativos();
  _syncLocksInativosTimer = setInterval(() => {
    if (document.hidden) return;
    sincronizarIndicadoresInativos();
  }, 2000);
}

async function garantirClienteLocalOracle({ clienteId, cdClienteOracle, nomeCliente = '', telefone = '' }) {
  const id = Number(clienteId);
  if (Number.isFinite(id) && id > 0) return id;

  const cd = (cdClienteOracle || '').toString().trim();
  if (!cd) return null;

  try {
    const r = await fetch('/garantir-cliente-local-oracle', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': getCookie('csrf_token')
      },
      body: JSON.stringify({
        cd_cliente_oracle: cd,
        nome: nomeCliente || `Cliente Oracle ${cd}`,
        telefone: telefone || ''
      })
    });
    const j = await r.json();
    if (j && j.success && j.cliente && j.cliente.id) {
      return Number(j.cliente.id);
    }
    return null;
  } catch (erro) {
    console.warn('Falha ao garantir cliente local:', erro);
    return null;
  }
}

async function iniciarContatoCliente({ clienteId, cdClienteOracle = '', telefone, nomeCliente = '', canal = 'telefone' }) {
  const tel = (telefone || '').toString().trim();
  if (!tel) {
    alert('Telefone nao informado para este cliente.');
    return false;
  }

  const confirmaMsg = canal === 'whatsapp'
    ? 'Voce deseja iniciar uma conversa no WhatsApp'
    : 'Voce deseja iniciar uma ligacao';
  if (!confirm(confirmaMsg)) {
    return false;
  }

  if (canal === 'whatsapp' && !normalizarNumeroWhatsApp(tel)) {
    const tentarLigacao = confirm('Numero invalido para WhatsApp. Deseja tentar ligacao normal');
    if (tentarLigacao) {
      abrirCanalContato('telefone', tel, nomeCliente);
    }
    return false;
  }

  const idLocal = await garantirClienteLocalOracle({
    clienteId,
    cdClienteOracle,
    nomeCliente,
    telefone: tel
  });
  if (!idLocal) {
    alert('Nao foi possivel preparar o cliente local para bloqueio de atendimento.');
    return false;
  }

  const reservado = await reservarAtendimentoCliente(idLocal, {
    forcar: false,
    aba: ABA_ATUAL,
    cdClienteOracle
  });
  if (!reservado) {
    alert('Cliente em atendimento por outro usuario ou nao foi possivel reservar agora.');
    return false;
  }
  marcarEmAtendimentoNoDOM({
    clienteId: idLocal,
    cdClienteOracle,
    porNome: (reservado.em_atendimento_por_nome || nomeCliente || 'Outro usuario'),
    ate: (reservado.em_atendimento_ate || ''),
  });

  if (canal === 'whatsapp') {
    return abrirWhatsApp(tel, nomeCliente);
  }

  window.location.href = `tel:${tel}`;
  return false;
}

function _iniciarDebounceFiltros() {
  const timers = new WeakMap();
  const buscaInput = document.getElementById('buscaRapida');
  const buscaStatus = document.getElementById('buscaStatus');
  const valorInicialBusca = buscaInput ? (buscaInput.value || '') : '';

  const setBuscaStatus = (msg, isWarning = false) => {
    if (!buscaStatus) return;
    buscaStatus.textContent = msg || '';
    buscaStatus.classList.toggle('text-danger', !!isWarning);
    buscaStatus.classList.toggle('text-muted', !isWarning);
  };

  const scheduleSubmit = (form, ms) => {
    if (!form) return;
    const prev = timers.get(form);
    if (prev) clearTimeout(prev);
    const timer = setTimeout(() => {
      if (buscaInput && buscaStatus) {
        const atual = (buscaInput.value || '').trim();
        const inicial = (valorInicialBusca || '').trim();
        if (atual !== inicial) {
          setBuscaStatus('Buscando...');
        }
      }
      document.body.classList.add('tab-switching');
      _mostrarSkeletonTrocaAba();
      form.submit();
      timers.delete(form);
    }, ms);
    timers.set(form, timer);
  };

  document.querySelectorAll('.js-debounce-submit-control').forEach((control) => {
    if (control.dataset.debounceBound === '1') return;
    control.dataset.debounceBound = '1';
    const ms = Math.max(120, parseInt(control.dataset.debounceMs || '250', 10) || 250);
    control.addEventListener('change', () => {
      scheduleSubmit(control.form, ms);
    });
  });

  document.querySelectorAll('.js-auto-submit-search').forEach((input) => {
    if (input.dataset.debounceBound === '1') return;
    input.dataset.debounceBound = '1';
    const ms = Math.max(180, parseInt(input.dataset.debounceMs || '380', 10) || 380);
    input.addEventListener('input', () => {
      scheduleSubmit(input.form, ms);
    });
  });
}

}

let buscaTimeout;

const buscaInput = document.getElementById('buscaRapida');
if (buscaInput) {

    clearTimeout(buscaTimeout);

async function buscarClientesTempoReal(termo) {
  try {
    const aba = ABA_ATUAL;
    // Oracle/Inativos usam renderizacao server-side agrupada.
    // Para essas abas, aplica busca via querystring preservando filtros atuais.
    if (aba === 'oracle' || aba === 'inativos') {
      if (ultimoTermoBusca === (termo || '')) return;
      ultimoTermoBusca = termo || '';
      const url = new URL(window.location.href);
      url.searchParams.set('aba', aba);
      if (termo) url.searchParams.set('q', termo);
      else url.searchParams.delete('q');
      document.body.classList.add('tab-switching');
      _mostrarSkeletonTrocaAba();
      window.location.href = url.toString();
      return;
    }
    const params = new URLSearchParams({ q: termo, aba, meus: APENAS_MEUS ? '1' : '0' });
    const response = await fetch(`/api/busca-clientes?${params}`);
    const data = await response.json();
    if (data.ok) {
      atualizarTabelaClientes(data.clientes);
    }
  } catch (error) { console.error('Erro ao buscar clientes:', error); }
}

function _linhasClientesTabela() {
  return Array.from(
    document.querySelectorAll(
      '#tbodyClientes tr[data-cliente-id], #tbodyClientes tr[data-cd-cliente-oracle], .rep-table tbody tr[data-cliente-id], .rep-table tbody tr[data-cd-cliente-oracle]'
    )
  ).filter(r => !r.querySelector('.empty-state'));
}

function _linhaVisivel(row) {
  return row.style.display !== 'none' && row.offsetParent !== null;
}

function _contarClientesExibidos() {
  if (_filtroCriticosAtivo) {
    const rowsCriticos = _linhasClientesTabela();
    return rowsCriticos.filter(_linhaVisivel).length;
  }
  const cards = Array.from(document.querySelectorAll('.rep-card'));
  const cardsVisiveis = cards.filter((card) => card.style.display !== 'none' && card.offsetParent !== null);
  if (cardsVisiveis.length > 0) {
    return cardsVisiveis.reduce((acc, card) => acc + (parseInt(card.dataset.totalClientes || '0', 10) || 0), 0);
  }
  const rows = _linhasClientesTabela();
  return rows.filter(_linhaVisivel).length;
}

  }

function _ehLinhaCritica(row) {
  if (!row) return false;
  return _avaliarCriticidadeLinha(row).critico;
}

function _parseDataLinha(valor) {
  if (!valor) return null;
  const normalizado = String(valor).trim().replace(' ', 'T');
  const data = new Date(normalizado);
  if (Number.isNaN(data.getTime())) return null;
  return data;
}

function _avaliarCriticidadeLinha(row) {
  const agora = new Date();
  const texto = (row.textContent || '').toUpperCase();
  const totalLigacoes = Number(row.dataset.totalLigacoes || 0);
  const temTelefone = row.dataset.temTelefone === '1' || !!row.querySelector('.tel-link');
  const valor = Number(row.dataset.valor || 0);
  const retornoAtrasado = row.dataset.retornoAtrasado === '1' || !!row.querySelector('.bi-exclamation-triangle-fill');
  const ultimaLigacao = _parseDataLinha(row.dataset.ultimaLigacao);
  const proximaLigacao = _parseDataLinha(row.dataset.proximaLigacao);

  let score = 0;
  const motivos = [];

  if (retornoAtrasado) {
    score += 80;
    motivos.push('retorno atrasado');
  }
  if (!temTelefone) {
    score += 45;
    motivos.push('sem telefone');
  }

  if (totalLigacoes === 0) {
    if (valor >= 5000) {
      score += 45;
      motivos.push('pendente alto valor');
    } else if (valor >= 1000) {
      score += 30;
      motivos.push('pendente com valor');
    } else {
      score += 15;
      motivos.push('pendente sem contato');
    }
  }

  if (ultimaLigacao) {
    const diasSemContato = Math.floor((agora - ultimaLigacao) / 86400000);
    if (diasSemContato >= 60) {
      score += 45;
      motivos.push('60+ dias sem contato');
    } else if (diasSemContato >= 30) {
      score += 30;
      motivos.push('30+ dias sem contato');
    } else if (diasSemContato >= 14) {
      score += 15;
      motivos.push('14+ dias sem contato');
    }
  }

  if (proximaLigacao && !retornoAtrasado) {
    const horasParaRetorno = (proximaLigacao - agora) / 3600000;
    if (horasParaRetorno >= 0 && horasParaRetorno <= 24) {
      score += 20;
      motivos.push('retorno em ate 24h');
    }
  }

  if (row.classList.contains('row-inadimplente') || texto.includes('INADIMPLENTE') || texto.includes('ATRASADO')) {
    score += 50;
    motivos.push('inadimplencia/atraso');
  }

  const critico = score >= 50;
  return { critico, score, motivos };
}

function aplicarFiltroCriticosTabela() {
  const rows = _linhasClientesTabela();
  rows.forEach(r => {
    const avaliacao = _avaliarCriticidadeLinha(r);
    r.classList.toggle('row-critical', avaliacao.critico);
    r.title = avaliacao.motivos.length ? `Criticidade ${avaliacao.score}: ${avaliacao.motivos.join(', ')}` : '';
    r.style.display = avaliacao.critico ? '' : 'none';
  });
  atualizarInfoQuickActions();
}

function filtrarClientesCriticos() {
  _filtroCriticosAtivo = true;
  aplicarFiltroCriticosTabela();
}

function limparFiltroCriticos() {
  _filtroCriticosAtivo = false;
  const rows = _linhasClientesTabela();
  rows.forEach(r => {
    r.style.display = '';
    r.classList.remove('row-critical');
    r.removeAttribute('title');
  });
  atualizarInfoQuickActions();
}

// SINCRONIZACAO ORACLE
let _syncOracleStatusTimer = null;
let _syncOracleAutoReloadPending = false;
let _syncOracleWasRunning = false;

function atualizarStatusSyncOracle() {
  const badge = document.getElementById('syncOracleStatusBadge');
  if (!badge) return;

  fetch('/sincronizar-oracle-status')
    .then(r => r.json())
    .then(data => {
      if (!data.ok) {
        badge.className = 'badge text-bg-secondary align-self-center';
        badge.textContent = 'Sync Oracle: indisponivel';
        return;
      }

      if (data.running) {
        _syncOracleWasRunning = true;
        badge.className = 'badge text-bg-warning align-self-center';
        badge.textContent = 'Sync Oracle: em andamento (' + (data.started_at || '--') + ')';
        return;
      }

      if (data.last_success === true) {
        badge.className = 'badge text-bg-success align-self-center';
        badge.textContent = 'Sync Oracle: ok (' + (data.finished_at || '--') + ')';
        if (_syncOracleAutoReloadPending && _syncOracleWasRunning) {
          _syncOracleAutoReloadPending = false;
          _syncOracleWasRunning = false;
          window.location.reload();
        }
        return;
      }

      if (data.last_success === false) {
        badge.className = 'badge text-bg-danger align-self-center';
        badge.textContent = 'Sync Oracle: erro (' + (data.finished_at || '--') + ')';
        if (_syncOracleAutoReloadPending && _syncOracleWasRunning) {
          _syncOracleAutoReloadPending = false;
          _syncOracleWasRunning = false;
          alert('A sincronizacao terminou com erro. Verifique os logs e tente novamente.');
        }
        return;
      }

      badge.className = 'badge text-bg-secondary align-self-center';
      badge.textContent = 'Sync Oracle: aguardando';
    })
    .catch(() => {
      badge.className = 'badge text-bg-secondary align-self-center';
      badge.textContent = 'Sync Oracle: indisponivel';
    });
}

function iniciarMonitorSyncOracle() {
  const badge = document.getElementById('syncOracleStatusBadge');
  if (!badge) return;
  atualizarStatusSyncOracle();
  if (_syncOracleStatusTimer) return;
  _syncOracleStatusTimer = setInterval(atualizarStatusSyncOracle, 5000);
}

function sincronizarOracle() {
  const btn = document.getElementById('btnSincronizarOracle');
  if (!btn) return;
  if (!confirm('Deseja sincronizar os clientes com Oracle agora\n\nEsta acao pode levar alguns minutos.')) return;
  const originalText = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<i class="bi bi-arrow-clockwise spin me-1"></i> Sincronizando...';

  fetch('/sincronizar-oracle-async', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrf_token') }
  })
    .then(r => r.json())
    .then(data => {
      const ok = !!(data.success || data.ok);
      const msg = data.message || data.mensagem || 'Sincronizacao iniciada.';
      if (ok) {
        _syncOracleAutoReloadPending = true;
        _syncOracleWasRunning = false;
        atualizarStatusSyncOracle();
        alert('' + msg + '\n\nA pagina sera atualizada automaticamente quando a sincronizacao concluir.');
      } else {
        alert('' + msg);
      }
    })
    .catch(() => alert('Erro ao sincronizar com Oracle.'))
    .finally(() => {
      btn.disabled = false;
      btn.innerHTML = originalText;
    });
}

async function abrirDetalhesClienteComSync(clienteId, cdClienteOracle = '', cnpj = '') {
  let cdAtual = (cdClienteOracle || '').toString().trim();
  const id = parseInt(String(clienteId || '0'), 10) || 0;
  const cnpjDigits = limpaDigitos(cnpj || '');

  if (!IS_SUPERVISOR) {
    detalhesClienteOracle(id || null, cdAtual);
    return;
  }

  if (!id) {
    detalhesClienteOracle(null, cdAtual);
    return;
  }

  try {
    const r = await fetch(`/clientes/${id}/sincronizar-oracle`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': getCookie('csrf_token')
      },
      body: JSON.stringify({
        cd_cliente_oracle: cdAtual,
        cnpj: cnpjDigits
      })
    });
    const j = await r.json();
    if (r.ok && j.ok && j.cliente && j.cliente.cd_cliente_oracle) {
      cdAtual = String(j.cliente.cd_cliente_oracle || '').trim();
    }
  } catch (err) {
    console.warn('Falha ao sincronizar cliente com Oracle antes dos detalhes:', err);
  }

  detalhesClienteOracle(id, cdAtual);
}

  const janelaDiasDetalhes = ABA_ATUAL === 'inativos' ? 730 : 365;

  if (clienteId && cdClienteOracle) {

    html += `</div></div>`;
  } else if (pedidos.length > 0) {
    html += `<div class="panel-card mt-3" style="margin-bottom:0;">

  if (cliente.data_ultima_sincronizacao) {

// TOGGLE REPRESENTANTES
function _carregarMapaGruposAbertos() {
  try {
    const raw = localStorage.getItem(STORAGE_OPEN_GROUPS_KEY);
    const parsed = raw ? JSON.parse(raw) : {};
    return parsed && typeof parsed === 'object' ? parsed : {};
  } catch (_) {
    return {};
  }
}

function _salvarGrupoAberto(grupoKey, aberto) {
  const key = String(grupoKey || '').trim();
  if (!key) return;
  const mapa = _carregarMapaGruposAbertos();
  const listaAtual = Array.isArray(mapa[ABA_ATUAL]) ? mapa[ABA_ATUAL] : [];
  const setAtual = new Set(listaAtual.map((item) => String(item)));
  if (aberto) setAtual.add(key);
  else setAtual.delete(key);
  mapa[ABA_ATUAL] = Array.from(setAtual);
  try {
    localStorage.setItem(STORAGE_OPEN_GROUPS_KEY, JSON.stringify(mapa));
  } catch (_) {}
}

function _grupoEstaAbertoSalvo(grupoKey) {
  const key = String(grupoKey || '').trim();
  if (!key) return false;
  const mapa = _carregarMapaGruposAbertos();
  const listaAtual = Array.isArray(mapa[ABA_ATUAL]) ? mapa[ABA_ATUAL] : [];
  return listaAtual.map((item) => String(item)).includes(key);
}

function _atualizarAriaExpanded(index, aberto) {
  const header = document.getElementById(`rep-header-${index}`);
  if (!header) return;
  header.setAttribute('aria-expanded', aberto ? 'true' : 'false');
}

function _restaurarGruposAbertos() {
  const dropdowns = document.querySelectorAll('.rep-dropdown[data-group-key]');
  dropdowns.forEach((div) => {
    const groupKey = String(div.dataset.groupKey || '').trim();
    if (!groupKey || !_grupoEstaAbertoSalvo(groupKey)) return;
    const id = (div.id || '').replace('representante-', '');
    if (!id) return;
    toggleRepresentante(id, true, { animate: false, persist: false });
  });
}

function toggleRepresentante(index, forceOpen = null, options = {}) {
  const div = document.getElementById(`representante-${index}`);
  const icone = document.getElementById(`icone-${index}`);
  if (!div || !icone) return;
  if (div.dataset.animating === '1') return;
  const animate = options.animate !== false;
  const persist = options.persist !== false;
  const OPEN_MS = 430;
  const CLOSE_MS = 320;

  const aberto = window.getComputedStyle(div).display !== 'none';
  const vaiAbrir = typeof forceOpen === 'boolean' ? forceOpen : !aberto;
  const groupKey = String(div.dataset.groupKey || '').trim();

  if (vaiAbrir === aberto) {
    if (persist && groupKey) _salvarGrupoAberto(groupKey, aberto);
    _atualizarAriaExpanded(index, aberto);
    return;
  }

  if (!vaiAbrir) {
    div.dataset.animating = '1';
    if (!animate) {
      div.style.display = 'none';
      div.style.maxHeight = '';
      div.style.opacity = '';
      div.style.transform = '';
      div.style.transition = '';
      div.style.overflow = '';
      div.dataset.animating = '0';
    } else {
      const alturaAtual = div.scrollHeight;
      div.style.overflow = 'hidden';
      div.style.maxHeight = `${alturaAtual}px`;
      div.style.opacity = '1';
      div.style.transform = 'translateY(0)';
      div.style.transition = `max-height ${CLOSE_MS}ms ease, opacity ${Math.round(CLOSE_MS * 0.75)}ms ease, transform ${Math.round(CLOSE_MS * 0.75)}ms ease`;
      requestAnimationFrame(() => requestAnimationFrame(() => {
        div.style.maxHeight = '0px';
        div.style.opacity = '0';
        div.style.transform = 'translateY(-4px)';
      }));
      setTimeout(() => {
        div.style.display = 'none';
        div.style.maxHeight = '';
        div.style.opacity = '';
        div.style.transform = '';
        div.style.transition = '';
        div.style.overflow = '';
        div.dataset.animating = '0';
      }, CLOSE_MS + 20);
    }
    icone.classList.remove('open');
    _atualizarAriaExpanded(index, false);
    if (persist && groupKey) _salvarGrupoAberto(groupKey, false);
  } else {
    div.dataset.animating = '1';
    div.style.display = 'block';
    if (!animate) {
      div.style.overflow = '';
      div.style.maxHeight = '';
      div.style.opacity = '';
      div.style.transform = '';
      div.style.transition = '';
      div.style.willChange = '';
      div.dataset.animating = '0';
    } else {
      const alturaFinal = div.scrollHeight;
      div.style.overflow = 'hidden';
      div.style.maxHeight = '0px';
      div.style.opacity = '0';
      div.style.transform = 'translateY(-6px)';
      div.style.transition = `max-height ${OPEN_MS}ms ease, opacity ${Math.round(OPEN_MS * 0.75)}ms ease, transform ${Math.round(OPEN_MS * 0.75)}ms ease`;
      div.style.willChange = 'max-height, opacity, transform';
      void div.offsetHeight;
      requestAnimationFrame(() => requestAnimationFrame(() => {
        div.style.maxHeight = `${alturaFinal}px`;
        div.style.opacity = '1';
        div.style.transform = 'translateY(0)';
      }));
      setTimeout(() => {
        div.style.maxHeight = '';
        div.style.opacity = '';
        div.style.transform = '';
        div.style.transition = '';
        div.style.overflow = '';
        div.style.willChange = '';
        div.dataset.animating = '0';
      }, OPEN_MS + 30);
    }
    icone.classList.add('open');
    _atualizarAriaExpanded(index, true);
    if (persist && groupKey) _salvarGrupoAberto(groupKey, true);
  }
  atualizarInfoQuickActions();
}

function getCookie(name) {
  let cookieValue = null;
  if (document.cookie && document.cookie !== '') {
    const cookies = document.cookie.split(';');
    for (let i = 0; i < cookies.length; i++) {
      const cookie = cookies[i].trim();
      if (cookie.substring(0, name.length + 1) === (name + '=')) {
        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
        break;
      }
    }
  }
  return cookieValue;
}

/* ============================================================
   ORDENAÇÃO DE COLUNAS NAS TABELAS
   ============================================================ */
function _getCellValue(tr, idx) {
  var cell = tr.cells[idx];
  if (!cell) return '';
  return (cell.innerText || cell.textContent || '').trim();
}

function _comparer(idx, asc) {
  return function(a, b) {
    var va = _getCellValue(a, idx);
    var vb = _getCellValue(b, idx);
    // tenta comparar como n?mero
    var na = parseFloat(va.replace(/[^\d,.-]/g, '').replace(',', '.'));
    var nb = parseFloat(vb.replace(/[^\d,.-]/g, '').replace(',', '.'));
    if (!isNaN(na) && !isNaN(nb)) return asc ? na - nb : nb - na;
    // tenta comparar como data dd/mm/yyyy
    var da = va.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
    var db = vb.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
    if (da && db) {
      var dta = new Date(da[3], da[2]-1, da[1]);
      var dtb = new Date(db[3], db[2]-1, db[1]);
      return asc ? dta - dtb : dtb - dta;
    }
    return asc ? va.localeCompare(vb, 'pt-BR') : vb.localeCompare(va, 'pt-BR');
  };
}

function _applySortToTbody(tbody, th, colIdx) {
  var table = th.closest('table');
  var allThs = table.querySelectorAll('thead th.th-sort');
  allThs.forEach(function(t) {
    if (t !== th) { t.classList.remove('asc', 'desc'); }
  });
  var asc = !th.classList.contains('asc');
  th.classList.toggle('asc', asc);
  th.classList.toggle('desc', !asc);
  var rows = Array.from(tbody.querySelectorAll('tr'));
  rows.sort(_comparer(colIdx, asc));
  rows.forEach(function(r) { tbody.appendChild(r); });
}

function sortRepTable(th, colIdx) {
  var tbody = th.closest('table').querySelector('tbody');
  if (!tbody) return;
  _applySortToTbody(tbody, th, colIdx);
}

function sortFlatTable(th, colIdx) {
  var tbody = document.getElementById('tbodyClientes');
  if (!tbody) return;
  _applySortToTbody(tbody, th, colIdx);
}

/* ============================================================
   SINCRONIZAÇÃO DE CLIENTES MANUAIS COM ORACLE
   ============================================================ */
function sincronizarClientesManuais() {
  const btn = document.getElementById('btnSincManuais');
  if (!btn) return;
  
  if (!confirm('Sincronizar todos os clientes manuais com o Oracle?\n\nIsso pode demorar alguns minutos.')) {
    return;
  }
  
  btn.disabled = true;
  btn.innerHTML = '<i class="bi bi-hourglass-split me-1"></i>Sincronizando...';
  
  fetch('/clientes/sincronizar-manuais-oracle', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-CSRFToken': getCookie('csrf_token')
    }
  })
  .then(response => response.json())
  .then(data => {
    if (data.ok) {
      let msg = `SINCRONIZAÇÃO concluída!\n\n` +
            `Total: ${data.total_base || 0}\n` +
            `Atualizados: ${data.atualizados || 0}\n` +
            `Não encontrados: ${data.nao_encontrados || 0}\n` +
            `Sem CNPJ: ${data.sem_cnpj || 0}`;
      
      // Mostrar lista de não encontrados para debug
      if (data.nao_encontrados_lista && data.nao_encontrados_lista.length > 0) {
        msg += `\n\nNão encontrados (primeiros 10):\n${data.nao_encontrados_lista.join('\n')}`;
      }
      
      alert(msg);
      location.reload();
    } else {
      alert('Erro ao sincronizar: ' + (data.mensagem || 'Erro desconhecido'));
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-arrow-repeat me-1"></i>Sincronizar com Oracle';
    }
  })
  .catch(error => {
    console.error('Erro:', error);
    alert('Erro ao sincronizar clientes: ' + error.message);
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-arrow-repeat me-1"></i>Sincronizar com Oracle';
  });
}
