<!-- ============================================================
     FILTRO INATIVOS (181 dias a 2 anos)
     ============================================================ -->
{% if aba == 'inativos' %}
{% set modo_compacto = filtro_inativos_compacto|default(false) %}
<div class="{% if modo_compacto %}search-bar mb-2{% else %}panel-card{% endif %}">
  {% if not modo_compacto %}
  <div class="panel-header">
    <i class="bi bi-funnel"></i>
    <span>Filtrar Clientes Inativos</span>
  </div>
  {% endif %}
  <div class="{% if modo_compacto %}py-2 px-3{% else %}panel-body{% endif %}" {% if not modo_compacto %}style="padding-bottom:16px;"{% endif %}>
    <form method="get" action="{{ url_for('meus_clientes') }}" class="row g-3">
      <input type="hidden" name="aba" value="inativos">
      <input type="hidden" name="visao" value="{{ visao|default(request.args.get('visao', 'dashboard')) }}">
      <input type="hidden" name="agrupar_por" value="{{ agrupar_por|default(request.args.get('agrupar_por', ''), true) }}">
      {% if dashboard_tipo %}
      <input type="hidden" name="dashboard_tipo" value="{{ dashboard_tipo }}">
      {% endif %}
      {% if modo_compacto %}
      <input type="hidden" name="consultor_filtro" value="">
      {% endif %}

      <div class="{% if modo_compacto %}col-12 col-md-4{% else %}col-md-6{% endif %}">
        <label class="form-label {% if modo_compacto %}small text-muted mb-1{% endif %}">{% if modo_compacto %}Status{% else %}Status de Credito:{% endif %}</label>
        <select class="form-select {% if modo_compacto %}form-select-sm{% endif %} js-debounce-submit-control" name="conceito_filtro" data-debounce-ms="260">
          <option value="">Todos os status</option>
          <option value="LIBERADO" {% if request.args.get('conceito_filtro') == 'LIBERADO' %}selected{% endif %}>Liberados</option>
          <option value="INADIMPLENTE" {% if request.args.get('conceito_filtro') == 'INADIMPLENTE' %}selected{% endif %}>Inadimplentes</option>
          <option value="SEM_CONCEITO" {% if request.args.get('conceito_filtro') == 'SEM_CONCEITO' %}selected{% endif %}>Sem Conceito</option>
        </select>
      </div>

      {% if not modo_compacto %}
        <div class="col-md-6">
          <label class="form-label">Consultor Oracle:</label>
          <select class="form-select js-debounce-submit-control" name="consultor_filtro" data-debounce-ms="260">
            <option value="">Todos os consultores</option>
            {% for consultor in consultores_inativos or [] %}
            <option value="{{ consultor.nome }}" {% if request.args.get('consultor_filtro') == consultor.nome %}selected{% endif %}>
              {{ consultor.nome }}
            </option>
            {% endfor %}
          </select>
        </div>
      {% endif %}
    </form>
  </div>
</div>
{% endif %}
