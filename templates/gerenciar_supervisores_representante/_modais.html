<!-- Modal Criar/Editar Supervisor -->
<div class="modal fade" id="modalSupervisor" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalSupervisorTitulo">Novo Supervisor de Representante</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formSupervisor">
                    <input type="hidden" id="supervisorId">
                    <div class="mb-3">
                        <label class="form-label">Nome *</label>
                        <input type="text" class="form-control" id="supervisorNome" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email *</label>
                        <input type="email" class="form-control" id="supervisorEmail" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Senha *</label>
                        <input type="password" class="form-control" id="supervisorSenha">
                        <small class="text-muted">Deixe em branco para manter a senha atual (ao editar)</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">CÃ³digo Supervisor TG650</label>
                        <input type="text" class="form-control" id="supervisorCodigoTg650">
                        <small class="text-muted">CÃ³digo do supervisor na tabela Geelemen (TG 650) do Oracle</small>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="salvarSupervisor()">Salvar</button>
            </div>
        </div>
    </div>
</div>
