<!-- TABELA DE RESULTADOS FILTRADOS -->
<div class="row g-4 mb-4" id="resultadosFiltrados" style="display: none;">
  <div class="col-12">
    <div class="card">
      <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center gap-2 flex-wrap">
        <div><i class="bi bi-calendar3"></i> Resultados do Período - <span id="periodoSelecionado"></span></div>
        <button type="button" class="btn btn-sm btn-light" onclick="copiarResumoFechamento()">
          <i class="bi bi-clipboard me-1"></i>Copiar resumo
        </button>
      </div>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-hover">
            <thead>
              <tr>
                <th>Operador</th>
                <th class="text-center">Total Ligações</th>
                <th class="text-center" title="Quando houver vendas, clique na linha para ver detalhes">Vendas</th>
                <th class="text-center">Retornar</th>
                <th class="text-center">Conversão</th>
                <th class="text-center">Meta Conv.</th>
                <th class="text-center">90-150</th>
                <th class="text-center">Próx. Inativação</th>
                <th class="text-end">Receita</th>
                <th class="text-end">Receita Comprovada (Oracle)</th>
              </tr>
            </thead>
            <tbody id="tbodyResultados">
              <tr>
                <td colspan="10" class="text-center">
                  <div class="spinner-border text-primary" role="status"></div>
                </td>
              </tr>
            </tbody>
            <tfoot id="tfootResultados"></tfoot>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="modalDetalheConversao" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="detalheConversaoTitulo">Detalhe de Conversão</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>
      <div class="modal-body">
        <div id="detalheConversaoResumo" class="alert alert-light border mb-3"></div>
        <div class="table-responsive">
          <table class="table table-sm table-hover align-middle">
            <thead>
              <tr>
                <th>Cliente</th>
                <th class="text-center">Qtd Compras</th>
                <th class="text-center">Última Compra</th>
                <th class="text-end">Receita</th>
                <th class="text-center">Pedido Oracle</th>
                <th class="text-center">Detalhes</th>
              </tr>
            </thead>
            <tbody id="tbodyDetalheConversao">
              <tr><td colspan="6" class="text-center text-muted py-4">Sem dados.</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="modalDetalhesOracleSupervisor" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-eye me-2"></i>Detalhes Oracle</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>
      <div class="modal-body" id="detalhesOracleSupervisorContent">
        <div class="text-center text-muted py-3">Carregando...</div>
      </div>
    </div>
  </div>
</div>
