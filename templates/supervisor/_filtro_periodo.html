<!-- Filtro por mes/ano -->
<div class="card mb-4">
  <div class="card-body">
    <div class="row align-items-center">
      <div class="col-md-6">
        <h5 class="mb-0">
          <i class="bi bi-funnel"></i> Filtrar Desempenho por Período
        </h5>
        <small class="text-muted">Selecione o mês/ano para visualizar o desempenho dos {{ dashboard_titulo|lower }}</small>
      </div>
      <div class="col-md-6">
        <div class="row g-2">
          <div class="col-md-8">
            <select class="form-select" id="filtroMes" onchange="aplicarFiltroMes()">
              {% for m in meses_disponiveis %}
              <option value="{{ m.mes }}-{{ m.ano }}" {% if m.mes == mes_filtro and m.ano == ano_filtro %}selected{% endif %}>
                {{ m.texto }}
              </option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-4">
            <button class="btn btn-primary w-100" onclick="aplicarFiltroMes()">
              <i class="bi bi-search"></i> Filtrar
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
