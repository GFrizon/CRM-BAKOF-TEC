<!-- Interações/Ligações do Mês por Consultor -->
<div class="row g-4">
  <div class="col-12">
    <div class="card">
      <div class="card-header">
        <i class="bi bi-person-lines-fill"></i> {{ 'Interações' if dashboard_tipo == 'consultor' else 'Ligações' }} do Mês por Operador ({{ dashboard_titulo }})
      </div>
      <div class="card-body border-bottom">
        <div class="row g-2">
          <div class="col-md-5">
            <label class="form-label mb-1">Operador</label>
            <select class="form-select" id="filtroConsultorMes">
              <option value="">Todos os operadores</option>
              {% for c in consultores %}
              <option value="{{ c.id }}">{{ c.nome }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label mb-1">Mês/Ano</label>
            <select class="form-select" id="filtroMesDetalhes">
              {% for m in meses_disponiveis %}
              <option value="{{ m.mes }}-{{ m.ano }}" {% if m.mes == mes_filtro and m.ano == ano_filtro %}selected{% endif %}>
                {{ m.texto }}
              </option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-3 d-flex align-items-end">
            <button class="btn btn-primary w-100" onclick="carregarLigacoesMes()">
              <i class="bi bi-search"></i> Ver {{ 'interações' if dashboard_tipo == 'consultor' else 'ligações' }}
            </button>
          </div>
        </div>
        <div class="mt-3" id="resumoLigacoesMes"></div>
      </div>
      <div class="table-container">
        <table class="table table-hover m-0">
          <thead>
            <tr>
              <th>Data/Hora</th>
              <th>Consultor</th>
              <th>Cliente</th>
              <th>Contato</th>
              <th>Resultado</th>
              <th class="text-end">Valor</th>
              <th>Observação</th>
            </tr>
          </thead>
          <tbody id="tbodyLigacoesMes">
            <tr>
              <td colspan="7" class="text-center text-muted py-4">
                Selecione o consultor e o mês para carregar os detalhes
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
